# A generic, single database configuration.

[alembic]
# Path to migration scripts.
script_location = alembic

# Template used to generate migration files.
# file_template = %%(rev)s_%%(slug)s

# sys.path will be prepended with this path so that `app` is importable.
prepend_sys_path = .

# Timezone for migration revision timestamps (UTC recommended).
# timezone =

# Max length of revision identifiers (default: unlimited).
# truncate_slug_length = 40

# Set to 'true' to enable Alembic post-write hooks (e.g., formatters).
# [post_write_hooks]

# Logging configuration — uses Python's logging config file format.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
